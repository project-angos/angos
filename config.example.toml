[server]
bind_address = "0.0.0.0"
port = 8000
#query_timeout_secs = 3600
#query_timeout_grace_period_secs = 60

[server.tls]
server_certificate_bundle = "tls.d/server-ca-bundle.pem"
server_private_key = "tls.d/server-private-key.pem"
client_ca_bundle   = "tls.d/client-ca-bundle.pem"
# client_auth controls how the server treats client certificates (only meaningful when client_ca_bundle is set).
# "optional" (default)  — clients may present a cert signed by client_ca_bundle, but may also connect without one.
# "required"            — a valid client cert is mandatory; the TLS handshake fails without one.
client_auth = "required"

# Global configuration options
[global]
max_concurrent_requests = 4
max_concurrent_cache_jobs = 4
update_pull_time = false

# Optional: Durable job queue for pull-through cache-fill tasks.
# When omitted, cache-fill jobs run in-process via the legacy TaskQueue.
# Pick exactly one of the backend sub-tables ([global.job_queue.fs] or
# [global.job_queue.s3]) to enable durable mode. With durable mode the server
# only enqueues jobs and publishes the pending gauge; run `angos worker`
# in addition to `angos server` to actually drain the queue.
#[global.job_queue]
#default_lease_ttl_secs = 30          # worker lease TTL
#pending_refresh_interval_secs = 15   # how often the server refreshes the pending gauge
#pending_ready_horizon_secs = 600     # only count jobs ready within this many seconds toward the autoscaler gauge
#
#[global.job_queue.fs]                # pick one: filesystem backend
#root_dir = "/var/lib/angos/jobs"     # must be writable by every server and worker replica
#lock_strategy = "memory"             # default; single-process scope only.
                                      # For multi-process pools sharing root_dir, configure
                                      # [global.job_queue.fs.lock_strategy.redis] instead
                                      # (see doc/how-to/durable-cache-jobs).
#
#[global.job_queue.s3]                # pick one: S3 backend
#bucket = "angos-jobs"                # S3 bucket for job envelopes
#prefix = "_jobs"                     # key prefix inside the bucket (default "_jobs")
#endpoint = "https://<s3-endpoint>"
#region = "us-east-1"                 # default "us-east-1"
#access_key_id = "<key-id>"
#secret_key = "<secret-key>"
#delete_if_match = true               # set false on endpoints without conditional DELETE

# Optional: Global access policy that applies to all repositories
# If not defined, repositories without specific policies will deny access
#[global.access_policy]
#default = "deny"
#rules = [
#    'identity.username == "admin"',
#    'identity.certificate.organizations.contains("infrastructure")'
#]

# Optional: Global retention policy that applies to all repositories
#[global.retention_policy]
#rules = [
#    'image.tag == "latest"',
#    'image.pushed_at > now() - days(90)'
#]

[blob_store.fs]
root_dir = "./data-angos"

#[blob_store.s3]
#access_key_id = "<key-id>"
#secret_key = "<secret-key>"
#endpoint = "https://<s3-compatible-endpoint>"
#bucket = "<bucket>"
#region = "<zone/region>"
#multipart_copy_threshold = "5GiB"
#multipart_copy_chunk_size = "100MiB"
#multipart_copy_jobs = 4
#multipart_part_size = "50MiB"
#max_attempts = 3
#operation_timeout_secs = 900
#operation_attempt_timeout_secs = 300

# Optional: Explicit metadata store configuration
# When omitted, the metadata store is auto-configured from the blob store settings.
# Use this section to override S3 metadata store tuning or point metadata at a different bucket.
#[metadata_store.s3]
#bucket = "<bucket>"
#region = "<zone/region>"
#endpoint = "https://<s3-compatible-endpoint>"
#access_key_id = "<key-id>"
#secret_key = "<secret-key>"
#link_cache_ttl = 30               # seconds; read-through cache TTL for link metadata (0 to disable)
#access_time_debounce_secs = 60    # seconds; buffer access time writes and flush periodically (0 to disable)
#
# Optional: Explicitly declare S3 conditional operation capabilities to avoid startup probe
# When omitted with lock_strategy = "s3", capabilities are auto-detected at startup.
#[metadata_store.s3.capabilities]
#put_if_none_match = true          # PutObject with If-None-Match: * (create-only)
#put_if_match = true               # PutObject with If-Match: <etag> (update-only, enables CAS optimizations)
#delete_if_match = true            # DeleteObject with If-Match: <etag> (atomic lock release)
#
#[metadata_store.s3.lock_strategy.redis]
#url = "redis://localhost:6379"
#ttl = 30

[observability.tracing]
endpoint = "http://127.0.0.1:4317"
sampling_rate = 1.0

