# Event webhooks -- notify external systems on registry operations
# Define webhooks with [event_webhook.<name>], then reference them in global or repository config.

# Audit log -- must succeed before client gets a response
#[event_webhook.audit]
#url = "https://audit.example.com/events"
#policy = "required"
#token = "audit-secret"
#events = ["manifest.push", "manifest.delete"]
#timeout_ms = 3000
#max_retries = 2

# Slack notifications -- best effort
#[event_webhook.slack]
#url = "https://hooks.slack.com/services/T.../B.../xxx"
#policy = "optional"
#events = ["manifest.push", "tag.create"]
#timeout_ms = 3000

# Analytics -- fire and forget
#[event_webhook.analytics]
#url = "https://analytics.internal/ingest"
#policy = "async"
#events = ["manifest.push", "manifest.delete", "blob.push", "tag.create", "tag.delete"]

# Scope a webhook to specific repositories with regex patterns
#[event_webhook.production-only]
#url = "https://hooks.example.com/production"
#policy = "required"
#events = ["manifest.push"]
#repository_filter = ["^production$"]

[repository."nginx"]

[repository."nginx".access_policy]
default = "allow"

# Optional: Replicate this repository to one or more downstream registries.
# Each downstream mirrors local mutations (manifest push, manifest/tag
# delete) and/or is reconciled by `angos scrub --replicate`. Declare one
# array-of-tables entry per downstream (shape mirrors [[repository.X.upstream]]).
#[[repository."nginx".downstream]]
#name = "eu-region"                    # local identifier for this downstream
#url = "https://angos-eu.example.com"  # registry root: mirrors the namespace verbatim.
                                       # A path (https://host/eu-mirror) becomes the namespace
                                       # prefix instead: nginx/x lands as eu-mirror/x.
#username = "replicator"
#password = "..."
#mode = "event+reconcile"              # "event+reconcile" | "event-only" | "reconcile-only"
#namespace_filter = ["^nginx/.*"]      # optional list of regex patterns; empty = match all
#max_concurrent_pushes = 4             # optional; per-manifest blob fan-out for this downstream (positive integer, default 4)
#prune = false                         # if true, scrub --replicate DELETES downstream tags absent locally
                                       # (authoritative one-way mirror only; leave false for active-active peers)
# Optional mTLS to the downstream (both required together):
#server_ca_bundle = "tls.d/downstream-ca-bundle.pem"
#client_certificate = "tls.d/replicator-cert.pem"
#client_private_key = "tls.d/replicator-key.pem"

[repository."test".access_policy]
default = "deny"
rules = [
    'identity.username in ["philippe"]',
    '"philippe" in identity.certificate.common_names',
    '"admins" in identity.certificate.organizations',
    """identity.id == "phil" && (request.action in [
    "get-api-version",
    "put-blob", "get-blob", "delete-blob",
    "put-manifest", "get-manifest", "delete-manifest",
    "get-referrers",
    "list-catalog",
    "list-tags"])"""
]
