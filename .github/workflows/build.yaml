name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v[0-9]+.[0-9]+.[0-9]+*" ]
  pull_request:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  GHCR_REPO: ghcr.io/${{ github.repository }}
  CONFORMANCE_IMAGE_NAME: conformance

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Check formatting
      run: cargo fmt -- --check
    - name: Check clippy
      run: cargo clippy -- -D warnings
  rust-test:
    # We need to a redis backend for the tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v6
    - name: Run tests
      run: |
        # Ensure redis service is running
        while ! nc -z localhost 6379; do
          echo "Waiting for redis to start..."
          sleep 1;
        done
        
        rustup component add llvm-tools
        cargo install grcov
              
        CARGO_INCREMENTAL=0 RUSTFLAGS='-Cinstrument-coverage' LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw' cargo build
        
        docker run --rm -d \
          -e RUSTFS_ACCESS_KEY=root \
          -e RUSTFS_SECRET_KEY=roottoor \
          --network host \
          --name rustfs \
          rustfs/rustfs:1.0.0-beta.8

        # Ensure the S3 service is running, then create the "registry" bucket.
        while ! curl -sf -o /dev/null http://127.0.0.1:9000/health; do
          echo "Waiting for rustfs to start..."
          sleep 1;
        done
        AWS_ACCESS_KEY_ID=root AWS_SECRET_ACCESS_KEY=roottoor AWS_DEFAULT_REGION=us-east-1 \
          aws --endpoint-url http://127.0.0.1:9000 s3api create-bucket --bucket registry

        CARGO_INCREMENTAL=0 RUSTFLAGS='-Cinstrument-coverage' LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw' cargo test --workspace
        grcov . --binary-path ./target/debug/deps/ -s . -t html --branch --ignore-not-existing --ignore "target/**" -o target/coverage/html
        grcov . --binary-path ./target/debug/deps/ -s . -t markdown --branch --ignore-not-existing --ignore "../*" --ignore "/*" --ignore "target/**"

        docker stop rustfs
    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage
        path: ./target/coverage/html/*
        if-no-files-found: error
        retention-days: 1

  build-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build conformance tool
        run: |
          git clone https://github.com/opencontainers/distribution-spec.git distribution-spec
          cd distribution-spec/conformance && \
            go test -c && \
            mv conformance.test ../.. && \
            cd ../..

      - name: Download zot benchmark
        run: |
          curl -L -o zb https://github.com/project-zot/zot/releases/download/v2.1.15/zb-linux-amd64
          chmod +x zb

      - name: Build the container
        run: |
          docker build -t ${CONFORMANCE_IMAGE_NAME} -f Dockerfile --build-arg RELEASE_MODE=release .
          docker save ${CONFORMANCE_IMAGE_NAME} -o conformance-image.tar

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: conformance-tools
          path: |
            conformance.test
            zb
            conformance-image.tar
          if-no-files-found: error
          retention-days: 1

  conformance:
    name: Conformance & E2E (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: build-conformance
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: fs-memory-variable-parts
            description: filesystem backend with memory lock and variable parts
            config: config-fs-memory-variable-parts.toml
            s3: false
            redis: false
          - variant: s3-memory-variable-parts
            description: s3 backend with memory lock and variable parts
            config: config-s3-memory-variable-parts.toml
            s3: true
            redis: false
          - variant: s3-cas-variable-parts
            description: s3 CAS backend with variable parts
            config: config-s3-cas-variable-parts.toml
            s3: true
            redis: false
          - variant: s3-redis-variable-parts
            description: s3 backend with redis lock and variable parts
            config: config-s3-redis-variable-parts.toml
            s3: true
            redis: true
          - variant: s3-memory-uniform-parts
            description: s3 backend with memory lock and uniform parts
            config: config-s3-memory-uniform-parts.toml
            s3: true
            redis: false
          - variant: s3-cas-uniform-parts
            description: s3 CAS backend with uniform parts
            config: config-s3-cas-uniform-parts.toml
            s3: true
            redis: false
          - variant: s3-redis-uniform-parts
            description: s3 backend with redis lock, uniform parts
            config: config-s3-redis-uniform-parts.toml
            s3: true
            redis: true
          - variant: fs-redis-variable-parts
            description: filesystem backend with redis lock and variable parts
            config: config-fs-redis-variable-parts.toml
            s3: false
            redis: true
    steps:
      - uses: actions/checkout@v6

      - name: Download test artifacts
        uses: actions/download-artifact@v8
        with:
          name: conformance-tools

      - name: Load container image
        run: |
          docker load -i conformance-image.tar
          chmod +x conformance.test zb

      - name: Start backend services
        run: |
          if [[ "${{ matrix.redis }}" == "true" ]]; then
            docker run --rm -d \
              --network host \
              --name redis-server \
              redis

            while ! nc -z localhost 6379; do
              echo "Waiting for redis to start..."
              sleep 1
            done
          fi

          # RustFS backs every S3 variant: it supports the full conditional-write
          # API the CAS lock needs (If-None-Match + If-Match) and is fast under
          # the zb load. registry-b is instance B's isolated replication bucket.
          if [[ "${{ matrix.s3 }}" == "true" ]]; then
            docker run --rm -d \
              -e RUSTFS_ACCESS_KEY=root \
              -e RUSTFS_SECRET_KEY=roottoor \
              --network host \
              --name rustfs \
              rustfs/rustfs:1.0.0-beta.8

            while ! curl -sf -o /dev/null http://127.0.0.1:9000/health; do
              echo "Waiting for rustfs to start..."
              sleep 1
            done

            for bucket in registry registry-b; do
              AWS_ACCESS_KEY_ID=root AWS_SECRET_ACCESS_KEY=roottoor AWS_DEFAULT_REGION=us-east-1 \
                aws --endpoint-url http://127.0.0.1:9000 s3api create-bucket --bucket "$bucket"
            done
          fi

      - name: Generate e2e configs (${{ matrix.description }})
        run: |
          # Derive a backend-only fragment from the matrix config by dropping its
          # trailing access-policy + conformance-repository block, then append
          # each scenario's repository overlay. This runs the e2e workflows
          # against the exact backend under test.
          sed '/^\[global\.access_policy\]/,$d' "conformance/${{ matrix.config }}" > /tmp/backend.toml

          cat /tmp/backend.toml conformance/e2e/overlay-push.toml  > /tmp/e2e-push.toml
          cat /tmp/backend.toml conformance/e2e/overlay-cache.toml > /tmp/e2e-cache.toml
          cat /tmp/backend.toml conformance/e2e/overlay-replication-a.toml > /tmp/e2e-replication-a.toml

          # Instance B gets an isolated backend: a distinct port plus, when the
          # backend is shared across instances (S3 bucket, redis lock keyspace),
          # a distinct bucket and lock prefix. FS data is per-container already.
          sed -e 's/^port = 8000$/port = 8001/' \
              -e 's/bucket = "registry"/bucket = "registry-b"/' \
              -e 's/\(key_prefix = "[^"]*\)"/\1b"/' \
              /tmp/backend.toml > /tmp/backend-b.toml
          cat /tmp/backend-b.toml conformance/e2e/overlay-replication-b.toml > /tmp/e2e-replication-b.toml

          echo "===== backend fragment ====="
          cat /tmp/backend.toml

      - name: Run conformance test & zot benchmark (${{ matrix.description }})
        run: |
          docker run --rm -d \
            -v ./conformance/${{ matrix.config }}:/config.toml \
            --network host \
            --name conformance-${{ matrix.variant }}-backend \
            ${CONFORMANCE_IMAGE_NAME} \
            server

          if ! timeout 30 bash -c 'until nc -z -w 3 127.0.0.1 8000; do sleep 1; done'; then
            echo "angos did not start within 30 seconds"
            exit 1
          fi

          source ./conformance/conformance-variables
          ./conformance.test

          zb_workdir="$(mktemp -d "${RUNNER_TEMP}/zb-conformance-${{ matrix.variant }}.XXXXXX")"
          time ./zb --working-dir "$zb_workdir" -c 5 -r conformance -n 100 http://localhost:8000

          # Release port 8000 so the e2e scenarios can reuse the same backend.
          docker rm -f conformance-${{ matrix.variant }}-backend

      - name: E2E - push and pull a Hub image
        run: |
          docker run -d --network host --name angos-push \
            -v "/tmp/e2e-push.toml:/config.toml" \
            ${CONFORMANCE_IMAGE_NAME} server

          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:8000/v2/ && break
            [ "$i" -eq 30 ] && { echo "angos did not start"; docker logs angos-push; exit 1; }
            sleep 1
          done

          # Pull a real image from Docker Hub, retag it to the local instance and push.
          docker pull -q alpine:3.20
          docker tag alpine:3.20 localhost:8000/test/alpine:ci
          docker push localhost:8000/test/alpine:ci

          # Drop every local copy so the pull below re-downloads the blobs from angos.
          docker rmi -f localhost:8000/test/alpine:ci alpine:3.20
          docker pull -q localhost:8000/test/alpine:ci
          docker run --rm localhost:8000/test/alpine:ci /bin/true
          echo "push/pull round-trip OK"

          docker rm -f angos-push

      - name: E2E - pull through the cache from Docker Hub
        run: |
          docker run -d --network host --name angos-cache \
            -v "/tmp/e2e-cache.toml:/config.toml" \
            ${CONFORMANCE_IMAGE_NAME} server

          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:8000/v2/ && break
            [ "$i" -eq 30 ] && { echo "angos did not start"; docker logs angos-cache; exit 1; }
            sleep 1
          done

          # First pull fetches the image from Docker Hub through angos and caches it.
          docker pull -q localhost:8000/docker-io/library/alpine:3.20
          # angos now serves the cached repository's tag list locally.
          curl -sf http://127.0.0.1:8000/v2/docker-io/library/alpine/tags/list | grep -q '"3.20"'
          # A second pull is served from the local cache.
          docker rmi -f localhost:8000/docker-io/library/alpine:3.20
          docker pull -q localhost:8000/docker-io/library/alpine:3.20
          docker run --rm localhost:8000/docker-io/library/alpine:3.20 /bin/true
          echo "pull-through cache OK"

          docker rm -f angos-cache

      - name: E2E - replicate a push from instance A to instance B
        run: |
          docker run -d --network host --name angos-repl-b \
            -v "/tmp/e2e-replication-b.toml:/config.toml" \
            ${CONFORMANCE_IMAGE_NAME} server
          docker run -d --network host --name angos-repl-a \
            -v "/tmp/e2e-replication-a.toml:/config.toml" \
            ${CONFORMANCE_IMAGE_NAME} server

          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:8000/v2/ \
              && curl -sf -o /dev/null http://127.0.0.1:8001/v2/ && break
            [ "$i" -eq 30 ] && { echo "instances did not start"; docker logs angos-repl-a; docker logs angos-repl-b; exit 1; }
            sleep 1
          done

          # Push to A; the event path replicates the tag to B (in-process drain).
          docker pull -q alpine:3.20
          docker tag alpine:3.20 localhost:8000/repl/alpine:v1
          docker push localhost:8000/repl/alpine:v1

          # Wait for the tag to converge on B.
          for i in $(seq 1 60); do
            curl -s http://127.0.0.1:8001/v2/repl/alpine/tags/list | grep -q '"v1"' && break
            [ "$i" -eq 60 ] && { echo "replication did not converge"; docker logs angos-repl-a; exit 1; }
            sleep 1
          done

          # Drop local copies and pull the replicated image from B.
          docker rmi -f localhost:8001/repl/alpine:v1 localhost:8000/repl/alpine:v1 alpine:3.20
          docker pull -q localhost:8001/repl/alpine:v1
          docker run --rm localhost:8001/repl/alpine:v1 /bin/true
          echo "replication A -> B OK"

          docker rm -f angos-repl-a angos-repl-b

      - name: Dump logs
        if: always()
        run: |
          for c in conformance-${{ matrix.variant }}-backend angos-push angos-cache angos-repl-a angos-repl-b; do
            if docker inspect "$c" >/dev/null 2>&1; then
              echo "===== $c ====="
              docker logs "$c" || true
              docker rm -f "$c" >/dev/null 2>&1 || true
            fi
          done

          for svc in rustfs; do
            if docker inspect "$svc" >/dev/null 2>&1; then
              docker logs "$svc" || true
              docker stop "$svc" || true
            fi
          done

          if [[ "${{ matrix.redis }}" == "true" ]]; then
            docker logs redis-server || true
            docker stop redis-server || true
          fi

  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
            binary_name: angos-darwin-amd64
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: angos-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: angos-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_name: angos-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-Clink-self-contained=yes -Clinker=rust-lld"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-Clink-self-contained=yes -Clinker=rust-lld"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/angos ${{ matrix.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          if-no-files-found: error
          retention-days: 1

  build-container:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RELEASE_MODE=release
          outputs: type=image,"name=${{ env.GHCR_REPO }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-container
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_REPO }}@sha256:%s ' *)

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}
          digest=$(docker buildx imagetools inspect "${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign container image with Cosign
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.GHCR_REPO }}@${{ steps.inspect.outputs.digest }}
        run: cosign sign --yes "${IMAGE}"

  release:
    runs-on: ubuntu-latest
    needs:
      - merge
      - build-binary
      - rust-checks
      - rust-test
      - conformance
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: /tmp/binaries
          pattern: binary-*
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign binaries with Cosign
        working-directory: /tmp/binaries
        run: |
          for binary in angos-*; do
            cosign sign-blob --yes --bundle "${binary}.cosign.bundle" "${binary}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: /tmp/binaries/*
          body: |
            ## Container Image

            ```
            docker pull ${{ env.GHCR_REPO }}:${{ github.ref_name }}
            ```

            ## Standalone Binaries

            | Platform             | Binary                 |
            |----------------------|------------------------|
            | macOS amd64 (Intel)  | `angos-darwin-amd64`   |
            | macOS arm64 (Apple)  | `angos-darwin-arm64`   |
            | Linux amd64          | `angos-linux-amd64`    |
            | Linux arm64          | `angos-linux-arm64`    |

            ## Verification with Cosign

            All release artifacts are signed with [Sigstore Cosign](https://docs.sigstore.dev/)
            using keyless signing backed by GitHub Actions OIDC. No key material is
            stored; verification relies on the public Sigstore transparency log.

            Install `cosign` from https://docs.sigstore.dev/cosign/installation/.

            ### Container image

            ```
            cosign verify ${{ env.GHCR_REPO }}:${{ github.ref_name }} \
              --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\.github/workflows/build\.yaml@refs/tags/" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com
            ```

            ### Standalone binaries

            Each binary ships with a companion `<binary>.cosign.bundle` file. Download
            both and verify, for example for the Linux amd64 binary:

            ```
            cosign verify-blob \
              --bundle angos-linux-amd64.cosign.bundle \
              --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\.github/workflows/build\.yaml@refs/tags/" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              angos-linux-amd64
            ```
