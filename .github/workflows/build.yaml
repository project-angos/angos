name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v[0-9]+.[0-9]+.[0-9]+*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  GHCR_REPO: ghcr.io/${{ github.repository }}
  CONFORMANCE_IMAGE_NAME: conformance

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: cargo fmt -- --check
    - name: Check clippy
      run: cargo clippy -- -D warnings
  rust-test:
    # We need to a redis backend for the tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        # Ensure redis service is running
        while ! nc -z localhost 6379; do
          echo "Waiting for redis to start..."
          sleep 1;
        done
        
        rustup component add llvm-tools
        cargo install grcov
              
        CARGO_INCREMENTAL=0 RUSTFLAGS='-Cinstrument-coverage' LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw' cargo build
        
          mkdir -p ./test/minio-data/registry
          docker run --rm -d \
            -v ./test/minio-data:/data \
            -e MINIO_ROOT_USER=root \
            -e MINIO_ROOT_PASSWORD=roottoor \
            -e MINIO_VOLUMES=/data \
            --network host \
            --name minio-server \
            quay.io/minio/minio \
            minio server /data

        # Ensure minio service is running
        while ! nc -z localhost 9000; do
          echo "Waiting for minio to start..."
          sleep 1;
        done

        CARGO_INCREMENTAL=0 RUSTFLAGS='-Cinstrument-coverage' LLVM_PROFILE_FILE='cargo-test-%p-%m.profraw' cargo test
        grcov . --binary-path ./target/debug/deps/ -s . -t html --branch --ignore-not-existing --ignore "target/**" -o target/coverage/html
        grcov . --binary-path ./target/debug/deps/ -s . -t markdown --branch --ignore-not-existing --ignore "../*" --ignore "/*" --ignore "target/**"
        
        docker stop minio-server
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: ./target/coverage/html/*
        if-no-files-found: error
        retention-days: 1

  build-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build conformance tool
        run: |
          git clone https://github.com/opencontainers/distribution-spec.git distribution-spec
          cd distribution-spec/conformance && \
            go test -c && \
            mv conformance.test ../.. && \
            cd ../..

      - name: Download zot benchmark
        run: |
          curl -L -o zb https://github.com/project-zot/zot/releases/download/v2.1.10/zb-linux-amd64
          chmod +x zb

      - name: Build the container
        run: |
          docker build -t ${CONFORMANCE_IMAGE_NAME} -f Dockerfile --build-arg RELEASE_MODE=release .
          docker save ${CONFORMANCE_IMAGE_NAME} -o conformance-image.tar

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conformance-tools
          path: |
            conformance.test
            zb
            conformance-image.tar
          if-no-files-found: error
          retention-days: 1

  conformance-fs:
    runs-on: ubuntu-latest
    needs: build-conformance
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: conformance-tools

      - name: Load container image
        run: |
          docker load -i conformance-image.tar
          chmod +x conformance.test zb

      - name: Run conformance test & zot benchmark (filesystem backend)
        run: |
          docker run --rm -d \
            -v ./conformance/config-fs.toml:/config.toml \
            --network host \
            --name conformance-fs-backend \
            ${CONFORMANCE_IMAGE_NAME} \
            server

          for i in {1..10}; do
            if nc -z -w 3 127.0.0.1 8000; then
              break
            fi
            sleep 1
          done

          source ./conformance/conformance-variables
          ./conformance.test

          time ./zb -c 5 -r conformance -n 100 http://localhost:8000

      - name: Dump registry logs (filesystem backend)
        if: always()
        run: |
          docker logs conformance-fs-backend || true
          docker stop conformance-fs-backend || true

  conformance-s3:
    runs-on: ubuntu-latest
    needs: build-conformance
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: conformance-tools

      - name: Load container image
        run: |
          docker load -i conformance-image.tar
          chmod +x conformance.test zb

      - name: Run conformance test & zot benchmark (s3 backend)
        run: |
          mkdir -p ./conformance/minio-data/registry
          docker run --rm -d \
            -v ./conformance/minio-data:/data \
            -e MINIO_ROOT_USER=root \
            -e MINIO_ROOT_PASSWORD=roottoor \
            -e MINIO_VOLUMES=/data \
            --network host \
            --name minio-server \
            quay.io/minio/minio \
            minio server /data

          while ! nc -z localhost 9000; do
            echo "Waiting for minio to start..."
            sleep 1;
          done

          docker run --rm -d \
            -v ./conformance/config-s3.toml:/config.toml \
            --network host \
            --name conformance-s3-backend \
            ${CONFORMANCE_IMAGE_NAME} \
            server

          for i in {1..10}; do
            if nc -z -w 3 127.0.0.1 8000; then
              break
            fi
            sleep 1
          done
          if [ $i -eq 10 ]; then
            echo "angos did not start within 10 seconds"
            exit 1
          fi

          source ./conformance/conformance-variables
          ./conformance.test

          time ./zb -c 5 -r conformance -n 100 http://localhost:8000

      - name: Dump registry logs (s3 backend)
        if: always()
        run: |
          docker logs conformance-s3-backend || true
          docker stop conformance-s3-backend || true
          docker logs minio-server || true
          docker stop minio-server || true

  conformance-s3-lock:
    runs-on: ubuntu-latest
    needs: build-conformance
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: conformance-tools

      - name: Load container image
        run: |
          docker load -i conformance-image.tar
          chmod +x conformance.test zb

      - name: Run conformance test & zot benchmark (s3 backend with s3 lock, no cache)
        run: |
          mkdir -p ./conformance/minio-data/registry
          docker run --rm -d \
            -v ./conformance/minio-data:/data \
            -e MINIO_ROOT_USER=root \
            -e MINIO_ROOT_PASSWORD=roottoor \
            -e MINIO_VOLUMES=/data \
            --network host \
            --name minio-server \
            quay.io/minio/minio \
            minio server /data

          while ! nc -z localhost 9000; do
            echo "Waiting for minio to start..."
            sleep 1;
          done

          docker run --rm -d \
            -v ./conformance/config-s3-lock.toml:/config.toml \
            --network host \
            --name conformance-s3-lock-backend \
            ${CONFORMANCE_IMAGE_NAME} \
            server

          for i in {1..10}; do
            if nc -z -w 3 127.0.0.1 8000; then
              break
            fi
            sleep 1
          done
          if [ $i -eq 10 ]; then
            echo "angos did not start within 10 seconds"
            exit 1
          fi

          source ./conformance/conformance-variables
          ./conformance.test

          time ./zb -c 5 -r conformance -n 100 http://localhost:8000

      - name: Dump registry logs (s3 backend with s3 lock)
        if: always()
        run: |
          docker logs conformance-s3-lock-backend || true
          docker stop conformance-s3-lock-backend || true
          docker logs minio-server || true
          docker stop minio-server || true

  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
            binary_name: angos-darwin-amd64
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: angos-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: angos-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_name: angos-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-Clink-self-contained=yes -Clinker=rust-lld"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-Clink-self-contained=yes -Clinker=rust-lld"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/angos ${{ matrix.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          if-no-files-found: error
          retention-days: 1

  build-container:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RELEASE_MODE=release
          outputs: type=image,"name=${{ env.GHCR_REPO }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-container
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_REPO }}@sha256:%s ' *)

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}
          digest=$(docker buildx imagetools inspect "${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign container image with Cosign
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.GHCR_REPO }}@${{ steps.inspect.outputs.digest }}
        run: cosign sign --yes "${IMAGE}"

  release:
    runs-on: ubuntu-latest
    needs:
      - merge
      - build-binary
      - rust-checks
      - rust-test
      - conformance-fs
      - conformance-s3
      - conformance-s3-lock
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: /tmp/binaries
          pattern: binary-*
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign binaries with Cosign
        working-directory: /tmp/binaries
        run: |
          for binary in angos-*; do
            cosign sign-blob --yes --bundle "${binary}.cosign.bundle" "${binary}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: /tmp/binaries/*
          body: |
            ## Container Image

            ```
            docker pull ${{ env.GHCR_REPO }}:${{ github.ref_name }}
            ```

            ## Standalone Binaries

            | Platform             | Binary                 |
            |----------------------|------------------------|
            | macOS amd64 (Intel)  | `angos-darwin-amd64`   |
            | macOS arm64 (Apple)  | `angos-darwin-arm64`   |
            | Linux amd64          | `angos-linux-amd64`    |
            | Linux arm64          | `angos-linux-arm64`    |

            ## Verification with Cosign

            All release artifacts are signed with [Sigstore Cosign](https://docs.sigstore.dev/)
            using keyless signing backed by GitHub Actions OIDC. No key material is
            stored; verification relies on the public Sigstore transparency log.

            Install `cosign` from https://docs.sigstore.dev/cosign/installation/.

            ### Container image

            ```
            cosign verify ${{ env.GHCR_REPO }}:${{ github.ref_name }} \
              --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\.github/workflows/build\.yaml@refs/tags/" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com
            ```

            ### Standalone binaries

            Each binary ships with a companion `<binary>.cosign.bundle` file. Download
            both and verify, for example for the Linux amd64 binary:

            ```
            cosign verify-blob \
              --bundle angos-linux-amd64.cosign.bundle \
              --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\.github/workflows/build\.yaml@refs/tags/" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              angos-linux-amd64
            ```
