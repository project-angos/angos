name: Renovate

on:
  schedule:
    # Monday 01:30 UTC, with a retry slot at 05:30 UTC. Both fall inside the
    # "before 10am on monday" (Europe/Paris) schedule in renovate.json.
    - cron: '30 1 * * 1'
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
    - name: Get app token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.RENOVATE_APP_ID }}
        private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: angos
    - uses: actions/checkout@v7
    - name: Run Renovate
      uses: renovatebot/github-action@v46.1.20
      with:
        configurationFile: .github/renovate-global.json5
        token: ${{ steps.app-token.outputs.token }}
        # The "full" image ships cargo/node so postUpgradeTasks can run
        # `cargo update` and `npm update` inside the update branches.
        renovate-version: full
