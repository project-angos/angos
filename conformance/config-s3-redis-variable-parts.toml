[server]
bind_address = "0.0.0.0"
port = 8000

[global]
# 307 temporary redirections are not defined in the OCI spec, so zb don't (seems to) support 307 it.
enable_blob_redirect = false
enable_manifest_redirect = false

[blob_store.s3]
# Test credentials for the local S3 (rustfs) instance
access_key_id = "root"
secret_key = "roottoor"
endpoint = "http://127.0.0.1:9000"
bucket = "registry"
region = "region"
multipart_copy_threshold = "5GiB"
multipart_copy_chunk_size = "100MiB"
multipart_copy_jobs = 10

[metadata_store.s3]
# Test credentials for the local S3 (rustfs) instance
access_key_id = "root"
secret_key = "roottoor"
endpoint = "http://127.0.0.1:9000"
bucket = "registry"
region = "region"

link_cache_ttl = 0
access_time_debounce_secs = 0

[metadata_store.s3.lock_strategy.redis]
url = "redis://127.0.0.1:6379"
ttl = 30
key_prefix = "angos-s3-redis-lock-"

[global.access_policy]
default_allow = true

[repository."conformance"]
