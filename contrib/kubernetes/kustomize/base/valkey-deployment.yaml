---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: valkey-deployment
  namespace: angos
  labels:
    app.kubernetes.io/name: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      containers:
      - name: valkey
        image: valkey/valkey:8.0.2
        ports:
        - containerPort: 6379
