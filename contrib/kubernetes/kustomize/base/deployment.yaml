---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: angos
  namespace: angos
  labels:
    app.kubernetes.io/name: angos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: angos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: angos
    spec:
      containers:
      - name: angos
        image: ghcr.io/project-angos/angos:main
        args:
        - server
        env:
        - name: RUST_LOG
          value: info
        ports:
        - containerPort: 8000
        startupProbe:
          tcpSocket:
            port: 8000
          periodSeconds: 1
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 1
          periodSeconds: 2
          failureThreshold: 3
          successThreshold: 1
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "500Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
        volumeMounts:
        - name: angos-config
          mountPath: /config.toml
          subPath: config.toml
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: angos-config
        secret:
          secretName: angos-config
